
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <meta name="title" content="Crispy Bacon | Professional Research Partner" />
    <meta name="description" content="Turn meetings and unstructured text into clear, usable knowledge. Private, secure, and bot-free research for high-performance teams." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'><rect width='64' height='64' rx='16' fill='%231a1a1a'/><path d='M24 18L16 26V38L24 46' stroke='white' stroke-width='4' stroke-linecap='square'/><path d='M40 18L48 26V38L40 46' stroke='%23ef7d31' stroke-width='4' stroke-linecap='square'/><circle cx='32' cy='32' r='4' fill='white'/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    
    <!-- TAILWIND CDN RESTORED FOR DEV ENVIRONMENT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Newsreader', 'serif'],
              display: ['Newsreader', 'serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              primary: 'var(--md-sys-color-primary)',
              'on-primary': 'var(--md-sys-color-on-primary)',
              surface: 'var(--md-sys-color-surface)',
              'on-surface': 'var(--md-sys-color-on-surface)',
              'on-surface-variant': 'var(--md-sys-color-on-surface-variant)',
              outline: 'var(--md-sys-color-outline)',
              'outline-variant': 'var(--md-sys-color-outline-variant)',
              background: 'var(--md-sys-color-background)',
              'on-background': 'var(--md-sys-color-on-background)',
              error: 'var(--md-sys-color-error)',
              success: 'var(--md-sys-color-success)',
              // M3 Surface Containers
              'surface-container-lowest': 'var(--md-sys-color-surface-container-lowest)',
              'surface-container-low': 'var(--md-sys-color-surface-container-low)',
              'surface-container': 'var(--md-sys-color-surface-container)',
              'surface-container-high': 'var(--md-sys-color-surface-container-high)',
              'surface-container-highest': 'var(--md-sys-color-surface-container-highest)',
              // Secondary/Tertiary (Mapped to surfaces for simplicity in MVP)
              secondary: 'var(--md-sys-color-surface-variant)',
              'on-secondary': 'var(--md-sys-color-on-surface)',
              'secondary-container': 'var(--md-sys-color-surface-container-high)',
              'on-secondary-container': 'var(--md-sys-color-on-surface)',
            },
            borderRadius: {
              'expressive': 'var(--radius-expressive)',
              'sheet': 'var(--radius-sheet)',
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'slide-up-lg': 'slideUpLg 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scaleIn 0.3s ease-out forwards',
              'spring-up': 'springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'spring-scale': 'springScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'shimmer': 'shimmer 2s linear infinite',
              'sheet-up': 'sheetUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'sheet-down': 'sheetDown 0.3s ease-in forwards',
              'skeleton-pulse': 'skeletonPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'hydrate': 'hydrate 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'spin-slow': 'spin 3s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUpLg: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              springUp: {
                '0%': { opacity: '0', transform: 'translateY(20px) scale(0.95)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              springScale: {
                '0%': { transform: 'scale(0.9)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              sheetUp: {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
              sheetDown: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(100%)' },
              },
              skeletonPulse: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              },
              hydrate: {
                '0%': { opacity: '0', filter: 'blur(4px)', transform: 'translateY(4px)' },
                '100%': { opacity: '1', filter: 'blur(0)', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>

    "url": "https://esm.sh/url@^0.11.4",

  }
}
</script>
