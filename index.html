    <meta name="title" content="Crispy Bacon | Professional Research Partner" />
    <meta name="description" content="Turn meetings and unstructured text into clear, usable knowledge. Private, secure, and bot-free research for high-performance teams." />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="/index.css">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Newsreader', 'serif'],
              display: ['Newsreader', 'serif'],
              slab: ['Newsreader', 'serif'],
              mono: ['Geist Mono', 'monospace'],
            },
            colors: {
              // ============================================
              // 1. THE NEW CLAUDE SYSTEM (Source of Truth)
              // ============================================
              
              // LIGHT MODE
              'light-bg-1': 'oklch(0.99 0 0)',           // Main Background
              'light-bg-2': 'oklch(0.97 0 0)',           // Secondary
              'light-elevated': 'oklch(1 0 0)',          // Cards (Pure White)
              'light-text-1': 'oklch(0.20 0 0)',         // Primary Text (Soft Black)
              'light-text-2': 'oklch(0.45 0 0)',         // Secondary Text
              'light-border': 'oklch(0.90 0 0)',         // Borders
              
              // DARK MODE (Warm Purple/Black)
              'dark-bg-1': 'oklch(0.18 0.01 270)',       
              'dark-elevated': 'oklch(0.25 0.01 270)',   
              'dark-text-1': 'oklch(0.95 0 0)',          
              'dark-text-2': 'oklch(0.75 0 0)',
              'dark-border': 'oklch(0.30 0.01 270)',

              // BRAND (Orange)
              'claude-light': 'oklch(0.65 0.15 35)',
              'claude-dark': 'oklch(0.70 0.15 35)',

              // ============================================
              // 2. LEGACY MAPPING (Aliases for Stability)
              // ============================================
              // This stops the app from breaking. We map old names to new colors.
              
              'background': 'oklch(0.99 0 0)',          // Maps to light-bg-1
              'surface': 'oklch(1 0 0)',                // Maps to light-elevated
              'surface-variant': 'oklch(0.97 0 0)',     // Maps to light-bg-2
              'surface-container': 'oklch(0.97 0 0)',   // Maps to light-bg-2
              'surface-container-low': 'oklch(0.99 0 0)',
              'surface-container-high': 'oklch(0.95 0 0)',
              'surface-container-highest': 'oklch(0.93 0 0)',
              
              'primary': 'oklch(0.65 0.15 35)',         // Maps to claude-light
              'on-primary': 'oklch(1 0 0)',             // White
              
              'on-background': 'oklch(0.20 0 0)',       // Maps to light-text-1
              'on-surface': 'oklch(0.20 0 0)',          // Maps to light-text-1
              'on-surface-variant': 'oklch(0.45 0 0)',  // Maps to light-text-2
              
              'outline': 'oklch(0.90 0 0)',             // Maps to light-border
              'outline-variant': 'oklch(0.95 0 0)',
              'error': 'oklch(0.50 0.22 25)',
              'success': 'oklch(0.48 0.18 145)',
            },
            borderRadius: {
              'expressive': '1.25rem',
              'sheet': '2.5rem',
              '4xl': '2rem',
              '5xl': '2.5rem',
            }
          }
        }
      }
    </script>
