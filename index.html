<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Crispy Bacon | Professional Research Partner</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/index.css">

    <style>
      :root {
        /* LIGHT MODE (Sandstone) */
        --color-background: 0.98 0.01 85;      /* oklch values */
        --color-on-background: 0.15 0.02 85;
        
        --color-surface: 1 0 0;                /* Pure White */
        --color-on-surface: 0.08 0.02 85;
        
        --color-primary: 0.68 0.19 45;         /* The Bacon Orange */
        --color-on-primary: 1 0 0;
        
        --color-surface-variant: 0.96 0.01 85;
        --color-on-surface-variant: 0.25 0.02 85;
        
        --color-outline: 0 0 0;
        --color-outline-opacity: 0.15;
      }

      .dark {
        /* DARK MODE (Stratified Charcoal) */
        --color-background: 0.14 0.01 0;
        --color-on-background: 0.98 0.01 0;
        
        --color-surface: 0.17 0.01 0;
        --color-on-surface: 0.98 0.01 0;
        
        --color-primary: 0.72 0.18 45;         /* Brighter Orange for Dark Mode */
        --color-on-primary: 1 0 0;
        
        --color-surface-variant: 0.21 0.01 0;
        --color-on-surface-variant: 0.85 0.01 0;
        
        --color-outline: 1 1 1;
        --color-outline-opacity: 0.20;
      }
    </style>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Newsreader', 'serif'],
              display: ['Newsreader', 'serif'],
              slab: ['Newsreader', 'serif'],
              // SWAPPED: JetBrains -> Geist Mono
              mono: ['Geist Mono', 'monospace'],
            },
            colors: {
              // Mapped to the Variables in the <style> tag above
              background: 'oklch(var(--color-background))',
              'on-background': 'oklch(var(--color-on-background))',
              
              surface: 'oklch(var(--color-surface))',
              'on-surface': 'oklch(var(--color-on-surface))',
              
              primary: 'oklch(var(--color-primary))',
              'on-primary': 'oklch(var(--color-on-primary))',
              
              'surface-variant': 'oklch(var(--color-surface-variant))',
              'on-surface-variant': 'oklch(var(--color-on-surface-variant))',
              
              outline: 'oklch(var(--color-outline) / var(--color-outline-opacity))',
            },
            borderRadius: {
              'expressive': '1.25rem',
              'sheet': '2.5rem',
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "zustand": "https://esm.sh/zustand@^5.0.10",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "vite": "https://esm.sh/vite@^7.3.1",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "path": "https://esm.sh/path@^0.12.7",
        "url": "https://esm.sh/url@^0.11.4",
        "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.91.1",
        "mammoth": "https://esm.sh/mammoth@^1.11.0",
        "stripe": "https://esm.sh/stripe@^20.2.0",
        "uuid": "https://esm.sh/uuid@^13.0.0",
        "@tanstack/react-query": "https://esm.sh/@tanstack/react-query@^5.90.20",
        "fuse.js": "https://esm.sh/fuse.js@^7.1.0"
      }
    }
    </script>
</head>
<body class="bg-background text-on-background antialiased overflow-x-hidden transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
