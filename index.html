    <style>
      :root {
        /* LIGHT MODE (Sandstone) */
        --color-background: 0.98 0.01 85;      /* oklch values */
        --color-on-background: 0.15 0.02 85;
        
        --color-surface: 1 0 0;                /* Pure White */
        --color-on-surface: 0.08 0.02 85;
        
        --color-primary: 0.68 0.19 45;         /* The Bacon Orange */
        --color-on-primary: 1 0 0;
        
        --color-secondary: 0.96 0.01 85;
        --color-on-secondary: 0.20 0.02 85;

        --color-error: 0.62 0.19 25;           /* Semantic Error (Red) */
        --color-on-error: 1 0 0;

        --color-surface-variant: 0.96 0.01 85;
        --color-on-surface-variant: 0.25 0.02 85;
        
        --color-outline: 0 0 0;
        --color-outline-opacity: 0.15;

        /* Surface Containers (Elevation) */
        --color-surface-container-lowest: 1 0 0;
        --color-surface-container-low: 0.97 0.01 85;
        --color-surface-container: 0.95 0.01 85;
        --color-surface-container-high: 0.93 0.01 85;
        --color-surface-container-highest: 0.91 0.01 85;
      }

      .dark {
        /* DARK MODE (Stratified Charcoal) */
        --color-background: 0.14 0.01 0;
        --color-on-background: 0.98 0.01 0;
        
        --color-surface: 0.17 0.01 0;
        --color-on-surface: 0.98 0.01 0;
        
        --color-primary: 0.72 0.18 45;         /* Brighter Orange for Dark Mode */
        --color-on-primary: 1 0 0;

        --color-secondary: 0.25 0.01 0;
        --color-on-secondary: 0.90 0.01 0;

        --color-error: 0.55 0.22 25;           /* Error in Dark Mode */
        --color-on-error: 1 0 0; /* White on Error */
        
        --color-surface-variant: 0.21 0.01 0;
        --color-on-surface-variant: 0.85 0.01 0;
        
        --color-outline: 1 1 1;
        --color-outline-opacity: 0.20;

        /* Surface Containers (Elevation) - Dark */
        --color-surface-container-lowest: 0.12 0.01 0;
        --color-surface-container-low: 0.17 0.01 0;
        --color-surface-container: 0.21 0.01 0;
        --color-surface-container-high: 0.26 0.01 0;
        --color-surface-container-highest: 0.31 0.01 0;
      }
    </style>
